  <main class="page">
    <h1 class="page-heading" data-scroll>Other Works</h1>
    <p class="page-subtitle" data-scroll>
      Fine art and creative projects that sit next to the browser: drawing, installation, and
      experiments in material and pattern.
    </p>

    <section class="gallery" data-scroll>
      <h2 class="page-section-title">Selected pieces</h2>

      <div class="gallery-grid">
        <!-- Work 1 -->
        <figure class="gallery-item">
          <div class="gallery-thumb">
            <img src="assets/images/work-1.jpg" alt="Held Together cardboard batik installation">
          </div>
          <figcaption class="gallery-caption">
            <span class="gallery-title">Held Together</span>
            <span class="gallery-meta">Cardboard batik installation · 2024</span>
            <p class="gallery-text">
              Large-scale modular batik structure exploring pattern, migration, and how temporary
              materials can still hold memory.
            </p>
          </figcaption>
        </figure>

        <!-- Work 2 -->
        <figure class="gallery-item">
          <div class="gallery-thumb">
            <img src="assets/images/work-2.jpg" alt="Yayoi Kusama inspired portrait drawing">
          </div>
          <figcaption class="gallery-caption">
            <span class="gallery-title">After Kusama</span>
            <span class="gallery-meta">Ink and digital drawing · 2024</span>
            <p class="gallery-text">
              Portrait study inspired by Yayoi Kusama, using a limited palette and repeating
              motifs to blur self and environment.
            </p>
          </figcaption>
        </figure>

        <!-- Work 3 -->
        <figure class="gallery-item">
          <div class="gallery-thumb">
            <img src="assets/images/work-3.jpg" alt="Wayang inspired illustration">
          </div>
          <figcaption class="gallery-caption">
            <span class="gallery-title">Wayang Signal</span>
            <span class="gallery-meta">Digital illustration · 2024</span>
            <p class="gallery-text">
              Hybrid wayang silhouettes and UI overlays thinking about notification badges as a
              kind of shadow play.
            </p>
          </figcaption>
        </figure>

        <!-- Work 4 -->
        <figure class="gallery-item">
          <div class="gallery-thumb">
            <img src="assets/images/work-4.jpg" alt="Sketchbook spread of time based experiments">
          </div>
          <figcaption class="gallery-caption">
            <span class="gallery-title">Time Notes</span>
            <span class="gallery-meta">Sketchbook spread · 2023</span>
            <p class="gallery-text">
              Process drawings for time-based projects, mapping loops, glitches, and repeated
              routines from everyday life.
            </p>
          </figcaption>
        </figure>

        <!-- Work 5 -->
        <figure class="gallery-item">
          <div class="gallery-thumb">
            <img src="assets/images/work-5.jpg" alt="Black and silver ink drawing with batik pattern fragments">
          </div>
          <figcaption class="gallery-caption">
            <span class="gallery-title">Quiet Pattern</span>
            <span class="gallery-meta">Ink on paper · 2023</span>
            <p class="gallery-text">
              Minimal batik fragments rendered in black and metallic ink, focusing on rhythm and
              empty space instead of full cloth.
            </p>
          </figcaption>
        </figure>

        <!-- Work 6 -->
        <figure class="gallery-item">
          <div class="gallery-thumb">
            <img src="assets/images/work-6.jpg" alt="Photograph of Garuda wing wearable in progress">
          </div>
          <figcaption class="gallery-caption">
            <span class="gallery-title">Garuda Wings (WIP)</span>
            <span class="gallery-meta">Wearable sculpture · 2024</span>
            <p class="gallery-text">
              Work-in-progress documentation of a Garuda-inspired wearable, testing structure,
              weight, and how wings move with the body.
            </p>
          </figcaption>
        </figure>
